server:
  # Railway inyectará la variable PORT. Si no existe, usa 5400.
  port: ${PORT:5400}

spring:
  application:
    name: microservice-gateway
  cloud:
    gateway:
      server:
        webflux: # Asegúrate de que esto envuelva a routes y globalcors
          routes:
            - id: auth-route
              uri: lb://microservice-auth
              predicates:
                - Path=/api/v1/auth/**
            - id: users-route
              uri: lb://microservice-auth
              predicates:
                - Path=/api/v1/users/**
            - id: catalog-route
              uri: lb://microservice-catalog
              predicates:
                - Path=/api/v1/catalog/**, /api/v1/product/**, /api/v1/service/**, /api/v1/category/**, /api/v1/itemtype/**

          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                  - "https://tu-app-en-produccion.vercel.app" # ¡Añade esto para el despliegue!
                allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
                allowedHeaders: ["Authorization", "Content-Type", "*"]
                maxAge: 3600

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

eureka:
  client:
    service-url:
      # Cambiamos localhost por el nombre del servicio definido en docker-compose
      defaultZone: ${EUREKA_URL:http://eureka-server:5401/eureka}
  instance:
    # Importante para que no choquen instancias en el despliegue
    instance-id: ${spring.application.name}:${random.uuid}
    # En la nube, es mejor que Eureka se comunique por IP interna
    prefer-ip-address: true

security:
  jwt:
    private:
      key: "238ed1228bb925027ee91ba96b6625453e30605e837d61979599c00b26a0ef3155cafb8bdf8141599aa7b8f72065f164b14fedda4bfc724ca77b16427a5446ba"
    user:
      generator: "vetonlinegenerator"
    token:
      timelife: 600000
  public-paths:
    - /api/v1/auth/login
    - /actuator/**

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      type: w3c

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.netflix.discovery: DEBUG
    com.netflix.discovery.DiscoveryClient: DEBUG