server:
  port: 5405

spring:
  application:
    name: microservice-auth
  datasource:
    url: jdbc:postgresql://localhost:5433/authentication_vetly
    username: postgres
    password: root
    drive-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  eureka:
    instance:
      hostname: localhost
    client:
      defaultZone: http://localhost:5401